<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>日报</title>
</head>
<body>
    <h1>昨日日报</h1>
    <p id="date"></p>
    <img id="pic" style="max-width:100%">

<script>
// 显示昨天日期
const d = new Date();
d.setDate(d.getDate() - 1);
document.getElementById("date").innerText = d.toLocaleDateString();

// 先获取图片地址，再显示图片
fetch("https://api.tangdouz.com/a/60/?return=")
.then(res => res.text())
.then(url => {
    url = url.trim();
    document.getElementById("pic").src = url;
})
.catch(err => {
    document.write("图片加载失败，请刷新");
});
</script>
</body>
</html>
