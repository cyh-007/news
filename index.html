<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史上的今天 - 自动生成卡片</title>
    <style>
        body { background: #f4f4f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'PingFang SC', sans-serif; }
        #output { box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 12px; max-width: 90%; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; border: none; background: #333; color: white; border-radius: 5px; cursor: pointer; }
        canvas { display: none; } /* 隐藏原始画布 */
    </style>
</head>
<body>

    <h2 id="loading">正在穿越历史...</h2>
    <img id="output" alt="历史上的今天卡片">
    
    <div class="controls">
        <button onclick="downloadImage()">保存图片</button>
    </div>

    <canvas id="mainCanvas" width="600" height="800"></canvas>

    <script>
        const apiAddr = "https://api.71xk.com/api/lishi";
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const imgElement = document.getElementById('output');

        async function init() {
            try {
                const response = await fetch(apiAddr);
                const data = await response.json();
                
                if(data.code === 200) {
                    drawCard(data.data);
                }
            } catch (err) {
                document.getElementById('loading').innerText = "加载失败，请刷新重试";
                console.error(err);
            }
        }

        function drawCard(content) {
            // 1. 背景绘制
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 装饰线
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

            // 2. 标题绘制
            ctx.fillStyle = '#333';
            ctx.font = 'bold 40px serif';
            ctx.textAlign = 'center';
            ctx.fillText("历 史 上 的 今 天", canvas.width / 2, 100);

            // 3. 日期
            const now = new Date();
            const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
            ctx.font = '24px sans-serif';
            ctx.fillStyle = '#666';
            ctx.fillText(dateStr, canvas.width / 2, 150);

            // 4. 正文内容处理 (自动换行)
            ctx.fillStyle = '#222';
            ctx.font = '22px sans-serif';
            ctx.textAlign = 'left';
            
            const text = content.replace(/<br>/g, "\n");
            wrapText(ctx, text, 60, 220, 480, 32);

            // 5. 页脚
            ctx.font = '16px sans-serif';
            ctx.fillStyle = '#999';
            ctx.textAlign = 'center';
            ctx.fillText("Generated by GitHub Pages & 71xk API", canvas.width / 2, canvas.height - 60);

            // 6. 将Canvas转换为图片显示
            imgElement.src = canvas.toDataURL('image/png');
            document.getElementById('loading').style.display = 'none';
        }

        // 文本换行辅助函数
        function wrapText(context, text, x, y, maxWidth, lineHeight) {
            const lines = text.split('\n');
            for (let i = 0; i < lines.length; i++) {
                let words = lines[i];
                let line = '';
                for (let n = 0; n < words.length; n++) {
                    let testLine = line + words[n];
                    let metrics = context.measureText(testLine);
                    let testWidth = metrics.width;
                    if (testWidth > maxWidth && n > 0) {
                        context.fillText(line, x, y);
                        line = words[n];
                        y += lineHeight;
                    } else {
                        line = testLine;
                    }
                }
                context.fillText(line, x, y);
                y += lineHeight;
            }
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'history-today.png';
            link.href = imgElement.src;
            link.click();
        }

        init();
    </script>
</body>
</html>
