<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>今日日报</title>
<style>
body{text-align:center;margin:30px;font-size:18px;}
img{max-width:90%;border-radius:10px;margin-top:10px;}
</style>
</head>
<body>

<h2>📅 今日日报</h2>
<p id="today"></p>
<img id="pic">

<script>
// 当前日期（今天）
const now = new Date();
document.getElementById("today").innerText = now.toLocaleDateString();

// 加载图片
fetch("https://api.tangdouz.com/a/60/?return=")
.then(res => res.text())
.then(url => {
  document.getElementById("pic").src = url.trim();
})
.catch(e => {
  document.write("图片加载失败");
});
</script>

</body>
</html>
