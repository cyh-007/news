<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>今日日报</title>
</head>
<body>
<h2>📅 今日日报</h2>
<p id="time"></p>
<h3>🖼️ 点击下方链接查看图片：</h3>
<a id="imgLink" target="_blank">点击查看图片</a>

<script>
// 显示今天时间
document.getElementById("time").innerText = new Date().toLocaleDateString();

// 正确获取图片链接并生成可点击链接
fetch("https://api.tangdouz.com/a/60/?return=")
.then(r=>r.text())
.then(u=>{
    u = u.trim();
    let a = document.getElementById("imgLink");
    a.innerText = u;
    a.href = u;
})
.catch(e=>{
    document.write("加载失败");
});
</script>
</body>
</html>
