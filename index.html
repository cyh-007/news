<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>每日日报</title>
    <style>
        body {
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h2>📅 昨日日报</h2>
    <p id="date"></p>
    <p>🖼️ 当日图片：</p>
    
    <!-- 重点：直接写死图片，必显示 -->
    <img id="dailyImg">

    <script>
        // 自动获取昨天日期
        const yesterday = new Date(Date.now() - 86400000).toLocaleDateString();
        document.getElementById("date").innerText = "日期：" + yesterday;

        // 强制加载图片（解决跨域问题）
        const img = document.getElementById("dailyImg");
        img.src = "https://api.tangdouz.com/a/60/?return=" + "?t=" + new Date().getTime();
        img.onerror = function () {
            img.src = "https://api.tangdouz.com/a/60/?return=";
        };
    </script>
</body>
</html>
