<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>今日日报</title>
<style>
body{text-align:center;margin-top:40px;font-size:18px}
a{font-size:20px;color:#007bff;text-decoration:none}
</style>
</head>
<body>

<h2>📅 今日日报</h2>
<p id="date"></p>
<br>
<a href="https://api.tangdouz.com/a/60/" target="_blank">点击查看今日图片</a>

<script>
const date = new Date()
document.getElementById("date").innerText =
  date.getFullYear()+"年"+(date.getMonth()+1)+"月"+date.getDate()+"日"
</script>

</body>
</html>
